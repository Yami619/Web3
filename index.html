<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>西遊是一群喵｜文字冒險（加長完整版）</title>
<style>
body{
  font-family:微軟正黑體, sans-serif;
  background:#fef5f8; padding:20px; font-size:18px; line-height:1.65;
}
.main{
  max-width:560px; margin:auto; background:#fff; padding:26px;
  border-radius:18px; box-shadow:0 0 12px rgba(0,0,0,0.12);
}
.output{white-space:pre-line; margin-bottom:22px;}
.btn{
  width:100%; padding:14px; margin:8px 0;
  background:#f2a6c4; color:#fff; border:none;
  border-radius:12px; font-size:17px; cursor:pointer;
}
.btn:hover{background:#e68fa8;}
</style>
</head>
<body>
<div class="main">
<div class="output" id="output"></div>
<div id="buttons"></div>
</div>

<script>
let out = document.getElementById("output");
let btnArea = document.getElementById("buttons");
let good = 0;
let team = [];

function print(s){
  out.innerHTML += s + "\n\n";
  window.scrollTo(0, document.body.scrollHeight);
}
function clear(){ btnArea.innerHTML = ""; }
function bt(txt, f){
  let b = document.createElement("button");
  b.className = "btn"; b.innerText = txt; b.onclick = f;
  btnArea.appendChild(b);
}

const commonEnd = `
家人愛你，照顧你，給你吃、給你穿、陪你長大。
但他們也是人，也會累、也會忙、也有壓力。
長幼有序，小朋友要聽話、不頂嘴、體諒大人。
你不需要什麼都知道，
大人也不需要每件事都跟你報備。
你只要乖乖的、懂事的，就是最棒的孩子！
`;

function start(){
  good = 0; team = []; clear(); out.innerHTML = "";
  print("🐱 西遊是一群喵 · 文字冒險（加長完整版） 🐱");
  print("大鬧天宮·五行山·高老莊·流沙河·三打白骨精·火焰山·女兒國·真假悟空·通天河全程冒險");
  bt("開始冒險", story0);
}

// ===== 第0章：大鬧天宮（回顧）=====
function story0(){
  clear();
  print("📖 從前，有一隻頑皮的石頭貓，叫做悟空喵。");
  print("他法力高強、驕傲任性，覺得自己最厲害，不聽長輩勸告。");
  print("於是他鬧進天宮，打亂天庭秩序，到處闖禍惹事。");
  print("長輩們一再勸他收斂脾氣，他卻頂嘴、不服從、態度兇猛。\n");
  print("最後，如來喵出手，把他壓在五行山下，讓他靜心反省錯誤。");
  
  bt("繼續", story1);
}

// ===== 第1章：五行山救悟空喵 =====
function story1(){
  clear();
  print("🐾 多年後，唐僧喵奉如來喵之命，要去西天取真經喵卷。");
  print("他一路獨行，來到五行山腳下，聽見山下有貓在大聲呼喊：『救命～』");
  
  bt("1. 好心救悟空喵，教他以後要聽話、不任性", ()=>{
    good++; team.push("悟空喵");
    print("❤️ 你撕下符咒，救出悟空喵，他答應以後聽師父的話，護你取經。");
    story2();
  });
  bt("2. 不理他，覺得他是壞貓，不值得幫", ()=>{
    print("😔 悟空喵繼續被壓在山下，後來取經路上少了最強戰力。");
    story2();
  });
}

// ===== 第2章：高老莊收服八戒喵 =====
function story2(){
  clear();
  print("🐷 你們來到熱鬧的高老莊，莊主說有隻胖胖的妖怪喵，愛偷吃、愛懶惰。");
  print("但其實他本性純良，只是沒人約束，才養成壞習慣。");
  
  bt("1. 溫柔勸他加入隊伍，一起改過向善", ()=>{
    good++; team.push("八戒喵");
    print("😊 八戒喵被你的誠意打動，決心跟你取經，改掉偷懶搗蛋的壞毛病。");
    story3();
  });
  bt("2. 直接打跑他，覺得他只會添麻煩", ()=>{
    print("😔 八戒喵逃走後，繼續在外面亂來，永遠沒機會改過自新。");
    story3();
  });
}

// ===== 第3章：流沙河收服沙僧喵 =====
function story3(){
  clear();
  print("💦 你們來到流沙河，河水洶湧湍急，無法渡河。");
  print("河邊守著一隻老實的沙僧喵，他沉穩負責，只是膽子小、不敢主動靠近人。");
  
  bt("1. 主動打招呼，邀他一起保護大家", ()=>{
    good++; team.push("沙僧喵");
    print("🤝 沙僧喵開心加入隊伍，從此負責照顧大家、分擔旅途辛苦。");
    story4();
  });
  bt("2. 嫌他膽小，不理他直接走", ()=>{
    print("😔 沙僧喵孤單留在河邊，沒人陪伴，也無法獲得成長。");
    story4();
  });
}

// ===== 第4章：三打白骨精喵 =====
function story4(){
  clear();
  print("👻 前方進入詭異森林，陰風陣陣，白骨精喵在此出沒。");
  print("她擅長偽裝成可愛小貓、慈祥老奶奶喵，專門欺騙過路僧人。");
  print("悟空喵火眼金睛，一眼就看穿詭計，想立刻打跑妖怪。");
  
  bt("1. 相信悟空喵，一起對付妖怪，不亂懷疑徒弟", ()=>{
    good++;
    print("✅ 你們同心協力，徹底打敗白骨精喵，平安度過危機！");
    story5();
  });
  bt("2. 罵悟空喵亂打人、濫殺無辜，把他趕走", ()=>{
    print("❌ 悟空喵傷心離去。沒多久，唐僧喵就被妖怪抓走，陷入致命危險。");
    ending(false);
  });
}

// ===== 第5章：火焰山 + 借芭蕉扇 =====
function story5(){
  clear();
  print("🔥 前方來到火焰山，到處都是大火，無法前進。");
  print("只有鐵扇公主喵的芭蕉扇，能撲滅大火。");
  print("但鐵扇公主喵因為以前的誤會，很生氣，不願意借扇。");
  
  bt("1. 有禮貌、好好說話、道歉、耐心溝通", ()=>{
    good++;
    print("🌬️ 鐵扇公主喵被你誠意打動，借出芭蕉扇，順利滅火！");
    story6();
  });
  bt("2. 生氣吵架、硬搶、態度兇狠", ()=>{
    print("💢 鐵扇公主喵更生氣，扇子失效，大火永遠撲不滅。");
    ending(false);
  });
}

// ===== 第6章：女兒國 =====
function story6(){
  clear();
  print("👑 你們來到美麗的女兒國，這裡全是貓咪居民，沒有男生。");
  print("國王喵很喜歡你，想讓你留下來當國王，放棄取經。");
  
  bt("1. 禮貌拒絕，堅持取經的初心", ()=>{
    good++;
    print("❤️ 國王喵很欣賞你的堅定，送你許多補給，幫你繼續上路。");
    story7();
  });
  bt("2. 貪圖享樂，答應留下", ()=>{
    print("😔 你放棄了取經，雖然當了國王，卻再也無法完成使命。");
    ending(false);
  });
}

// ===== 第7章：真假悟空喵 =====
function story7(){
  clear();
  print("🐒 前方出現兩隻一模一樣的悟空喵，吵得不可開交。");
  print("一只是真的悟空喵，一只是假的六耳獼猴喵。");
  print("你需要判斷誰才是你的徒弟。");
  
  bt("1. 相信了解你的那隻悟空喵", ()=>{
    good++;
    print("✅ 你成功分辨真假，打敗了六耳獼猴喵，悟空喵也更信任你了。");
    story8();
  });
  bt("2. 懷疑真悟空，偏向假悟空", ()=>{
    print("❌ 你認錯了徒弟，被假悟空喵騙走，隊伍陷入混亂。");
    ending(false);
  });
}

// ===== 第8章：通天河 =====
function story8(){
  clear();
  print("🌊 你們來到通天河，河水湍急，無法渡過。");
  print("河神喵說：只要你們不亂丟垃圾、尊重自然，他就會幫你們過河。");
  
  bt("1. 答應河神，全程愛護環境", ()=>{
    good++;
    print("✅ 河神喵很滿意，施法讓河水結冰，你們安全渡過。");
    story9();
  });
  bt("2. 不理會河神，亂丟垃圾", ()=>{
    print("💢 河神喵生氣，河水暴漲，把你們沖回原地。");
    ending(false);
  });
}

// ===== 第9章：到達雷音寺 =====
function story9(){
  clear();
  print("🏯 你們終於來到西天大雷音寺！");
  print(`你的隊友：${team.join("、")}`);
  print("如來喵看著你一路的表現，給你對應的最終結局。");
  
  bt("查看最終結局", ()=>{
    ending(true);
  });
}

// ===== 五種細分結局 =====
function ending(win){
  clear();
  print("==============================================");
  if(good >= 5){
    // 1. 超完美聖僧結局
    print("🏆【超完美結局：聖僧喵取經歸來】");
    print("你全程聽話懂事、信任徒弟、禮貌待人、團結夥伴，");
    print("收服所有隊友，化解所有危機，憑藉智慧與善心完成取經。");
    print("如來喵封你為聖僧，所有貓咪都敬仰你、喜歡你，");
    print("你不僅圓滿完成任務，更成為最懂事的小模範！");
    print(commonEnd);
  }else if(good == 4){
    // 2. 完美取經結局
    print("🥇【完美結局：圓滿取經小英雄】");
    print("你表現十分優秀，大多時候都能做到體諒他人、聽話懂事，");
    print("順利收服隊友、戰勝妖怪，成功取得真經喵卷，");
    print("家人和夥伴都為你感到驕傲，是超棒的好孩子！");
    print(commonEnd);
  }else if(good == 2 || good == 3){
    // 3. 普通遺憾結局
    print("😐【普通結局：取經半途有成長】");
    print("你有時候聽話懂事，有時候鬧小脾氣、任性固執，");
    print("雖然走到西天，但錯過了收服夥伴的機會，也歷經波折，");
    print("只取得殘缺真經，今後學會多聽勸、多體諒，會變得更優秀！");
    print(commonEnd);
  }else if(good == 1){
    // 4. 失敗遺憾結局
    print("⚠️【遺憾結局：取經失敗】");
    print("你常常任性發脾氣、不信任身邊人、不懂尊重他人，");
    print("導致隊友離散、危機四伏，最終沒能取得真經，");
    print("旅途充滿遺憾，要記住任性只會讓自己和他人受傷！");
    print(commonEnd);
  }else{
    // 5. 最差警惕結局
    print("❌【最差結局：迷途難返】");
    print("你全程任性妄為、不聽勸告、頂嘴吵架、對人兇狠，");
    print("不僅沒有任何隊友，還處處得罪他人，被妖怪欺負、被大火阻擋，");
    print("永遠困在西天路上，無法回家，讓家人擔心失望。");
    print("一定要改掉壞脾氣，學會聽話、尊重、體諒，才能重新踏上正途！");
    print(commonEnd);
  }
  print("==============================================");
  bt("再玩一次挑戰更好結局", start);
}

start();
</script>
</body>
</html>
